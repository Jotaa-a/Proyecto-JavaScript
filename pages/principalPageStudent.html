<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiante</title>
    <link rel="stylesheet" href="../Styles/principalPageStyles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="head-fluid">
        <img class="head-fluid__logo" src="../media/loginLogo.png" alt="Logo_Image">
        <h4 class="head-fluid__h4">Portal Estudiante</h4>
        <div class="head-fluid__buttons">
            <img class="head-fluid__button noti" src="../media/iconBell.png" alt="iconBell">
            <img class="head-fluid__button config" src="../media/configIcon.png" alt="configIcon">
            <img class="head-fluid__button profile" src="../media/logoProfile.png" alt="LogoProfile">
        </div>
    </div>
    <div class="body-fluid">
        <div class="body-left">
            <h2 class="bienvenida">Bienvenido Camper</h2>

            <div class="cards-column">
                <div class="small-card small-card__link-course" data-href="./courses.html">
                    <h3>Cursos</h3>
                </div>
                <div class="small-card small-card__link-lections" data-href="./leccionesStdn.html">
                    <h3>Cursos - Lecciones</h3>
                </div>
                <div class="small-card small-card__link-califications" data-href="./califications.html">
                    <h3>Calificaciones</h3>
                </div>
                <div class="small-card third-card">
                    <h3>Student Score with motivate message</h3>
                    <h1 id="scoreAV"></h1>
                </div>
            </div>
        </div>
        <div class="body-right">
            <div class="big-card">
                <img class="big-card__image" src="../media/studentsImage.png" alt="StudentImgaeBigcontainer">
            </div>
        </div>
    </div>
    <script type="module" src="../Scripts/principalPageStudent.js"></script>
</body>
</html>
