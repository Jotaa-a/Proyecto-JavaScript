<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Styles/principalPageStyles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="head-fluid">
        <img src="../media/LoginLogo.png" alt="Logo_Image">
        <button class="head-fluid__button">Dashbords</button>
        <button class="head-fluid__button">Courses</button>
        <button class="head-fluid__button">Assignments</button>
        <button class="head-fluid__button">Progress</button>
        <button class="head-fluid__button">Profile</button>
    </div>
    <div class="body-fluid">
        <div class="body-fluid__dashboard">
            <h2>Dashboard</h2>
        </div>
        <div class="dashboard-flex">
        <div class="dashboard-flex__cards">
            <h3>Activate courses</h3>
            <p>3</p>
        </div>
        <div class="dashboard-flex__cards">
            <h3>Pending assignments</h3>
            <p>4</p>
        </div>
        <div class="dashboard-flex__cards">
            <h3>Overall Progress</h3>
            <p>75%</p>
        </div>
        </div>
        <div class="enrolled-section">
        <div class="section-header">
            <h3></h3>
            <button>Brouse more courses</button>
        </div>
        <div class="enrolled-courses">
            <div class="image-course"></div>
            <div class="course-content"></div>
        </div>
        <div class="enrolled-courses">
            <div class="image-course"></div>
            <div class="course-content"></div>
        </div>
        <div class="enrolled-courses">
            <div class="image-course"></div>
            <div class="course-content"></div>
        </div>
        </div>
        <div class="recent-activity">
            <h3>Recent Activities</h3>
            <div class="activity-list">
                <div class="activity">
                    <div class="activity-icon"></div>
                    <div class="activity-content"></div>
                </div>
                <div class="activity">
                    <div class="activity-icon"></div>
                    <div class="activity-content"></div>
                </div>
                <div class="activity">
                    <div class="activity-icon"></div>
                    <div class="activity-content"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
