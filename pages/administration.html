<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Styles/administration.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Styles/gestorCursos.css">
</head>
<body>
    <div class="head-fluid">
        <img class="head-fluid__logo" src="../media/loginLogo.png" alt="Logo_Image">
        <h4 class="head-fluid__h4">Portal Administracion</h4>
        <div class="head-fluid__buttons">
            <img class="head-fluid__button noti" src="../media/iconBell.png" alt="iconBell">
            <img class="head-fluid__button config" src="../media/configIcon.png" alt="configIcon">
            <img class="head-fluid__button profile" id="profile" src="../media/logoProfile.png" alt="LogoProfile">
        </div>
    </div>

    <div class="modal-profile" id="modalProfile">
            <button class="open-profile">Perfil</button>
            <button class="close-sesion" id="closeSesion" >Cerrar sesión</button>
    </div>

    <div class="tittle">
        <h1>Institucion De Aprendizaje ABC</h1>
        <p>Perfil Del Administrador</p>
    </div>
    <div class="container-page">

        <!-- Tabla de cursos -->
        <div class="cursos-activos" id="visualCursos">
            <table class="tabla-cursos">
                <thead>
                    <tr>
                        <th>Cursos</th>
                        <th>Profesor</th>
                        <th>Sesiones</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCursos"></tbody>
            </table>
        </div>
        <div class=" botones">
            <button class="botoncitos crear-cursos" id="btnGestorCuros">
                Añadir cursos
            </button>

            <button class="botoncitos" id="botonDocentes">
                Gestionar docentes
            </button>

            <button class="botoncitos" id="agregarProfesor">
                Agregar profesor
            </button>
            

            <button class="botoncitos lecciones-contenidos" id="btnLecciones">
                Lecciones y Contenidos
            </button>
        </div>
    </div>

    <div class="cursos-container" id="containerCursos">
        <div class="cursos-contenido" id="contenidoCursos">
        </div>
    </div>


    <div class="docentes" id="docentes">
        <div class="contenido-docentes">
            <p id="cerrarModal" class="cerrar">&times;</p>
            <h1 id="titulo">Gestion de Docentes </h1>
            <table class="tabla-profesores">
                <thead >        
                    <tr class="tableTitle">
                        <th>Codigo</th>
                        <th></th>
                        <th>Correo</th>
                        <th>Nombre</th>
                        <th>Curso</th>
                        <th>Duracion del curso</th>
                        <th></th>
                    </tr>
                </thead>
              <tbody id="bodytabla"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal formulario cursos -->
    <div class="modal-cursos" id="modalCursos">
        <div class="modal-cursos__content">
            <button class="modal-cursos__close" id="closeModalCurso">x</button>
            <h2 id="modalCursoTitulo">Crear Curso</h2>

            <input type="text" id="inputTitle" placeholder="Nombre del curso">
            <input type="text" id="inputProfesor" placeholder="Profesor">
            <input type="text" id="inputInfo" placeholder="Descripción">
            <input type="number" id="inputScore" placeholder="Nota">
            <input type="number" id="inputSesions" placeholder="Sesiones">
            <input type="text" id="inputImg" placeholder="Url imagen">

            <button id="btnGuardarCurso">Guradar</button>
        </div>
    </div>

   <!--Agregar docentes--> 

<div class="form-agregar" id="form-agregar">
    
    <form class="form-content" id="formProfesor">

        <span id="cerraradd" class="cerrarAdd">&times;</span>

        <h1>Añadir Un Nuevo Docente</h1>

        <input type="text" id="nuevoCodigo" placeholder="Codigo del profesor" required>
        <input type="text" id="nuevoProfesor" placeholder="Nombre del profesor" required>
        <input type="email" id="nuevoEmail" placeholder="Email del profesor" required>
        <input type="text" id="nuevoCurso" placeholder="Curso" required>
        <input type="text" id="nuevaDuracion" placeholder="Duración" required>
        <input type="text" id="nuevaImagen" placeholder="URL imagen" required>

        <button class="addBTN" type="submit">Añadir</button>

    </form>

</div>

    <script type="module" src="../AdministrationJS/administration.js"></script>
    <script type="module" src="../AdministrationJS/gestorCursos.js"></script>
    <script type="module" src="../AdministrationJS/añadirDocentes.js"></script>
</body>
</html>
