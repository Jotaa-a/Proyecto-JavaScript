<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Califications</title>
    <link rel="stylesheet" href="../Styles/courseStyles.css">
</head>
<body>
    <div class="head-fluid">
        <img class="head-fluid__logo" src="../media/loginLogo.png" alt="Logo_Image">
        <div class="head-fluid__h4"  data-href="./principalPageStudent.html">
            <h4 >Portal Estudiante</h4>
        </div>
        <div class="head-fluid__buttons">
            <img class="head-fluid__button noti" src="../media/iconBell.png" alt="iconBell">
            <img class="head-fluid__button config" src="../media/configIcon.png" alt="configIcon">
            <img class="head-fluid__button profile" src="../media/logoProfile.png" alt="LogoProfile">
        </div>
    </div>
    <div class="body-fluid">
        <div class="body-fluid__head">
            <h2>Cursos</h2>
        </div>
        <div class="courses__cards">
            <div class="course__card" id="modalIntro"
                data-title="Introducción a la Programación" 
                data-info="Fundamentos de lógica, algoritmos y programación orientada a objetos usando Python" 
                data-profesor="Carlos Martínez"
                data-img = "../media/Carlos-Martinez.png">
                <img class="course-card__logo" src="../media/Carlos-Martinez.png" alt="">
                <span class="course-card__subject">Introducción a la Programación</span>
                <span class="course-card__score">90</span>
            </div>
            
            <div class="course__card" id="modalDesign"
                data-title="Diseño Web" 
                data-info="Principios de maquetación con HTML y CSS, diseño responsive y nociones básicas de UI/UX" 
                data-profesor="Laura Gómez"
                data-iimg="../media/Luarua-Gomez.png">
                <img class="course-card__logo" src="../media/Luarua-Gomez.png" alt="">
                <span class="course-card__subject">Diseño Web</span>
                <span class="course-card__score">90</span>
            </div>
            
            <div class="course__card" id="modalBD"
                data-title="Base de Datos" 
                data-info="Modelado entidad-relación, normalización y consultas con SQL en sistemas gestores como MySQL" 
                data-profesor="Andrés Herrera"
                data-img="../media/Andres-Herrera.png">
                <img class="course-card__logo" src="../media/Andres-Herrera.png" alt="">
                <span class="course-card__subject">Base de Datos</span>
                <span class="course-card__score">90</span>
            </div>
            
            <div class="course__card" id="modelIngles"
                data-title="Inglés Técnico" 
                data-info="Lectura y comprensión de documentación técnica, vocabulario especializado y escritura de reportes en inglés" 
                data-profesor="Sandra Ríos"
                data-img="../media/sandra-Rios.png">
                <img class="course-card__logo" src="../media/sandra-Rios.png" alt="">
                <span class="course-card__subject">Inglés Técnico</span>
                <span class="course-card__score">90</span>
            </div>
        </div>
        
        <!-- Modal cards -->

        <div class="courses__modal" id="courses__modal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">x</button>
                <h2 id="modalTitle">Titulo</h2>
                <div class="course-info" id="modalInfo">Descripcion</div>
                <div class="course-profesor">
                    <img class="course-prof__img" id="modalProfesorImg" src="../media/logoProfile.png" alt="" >
                    <p id="modalProfesorName">Nombre Docente</p>
                </div>
            </div>
        </div>
        
    </div>
</div>
    </div>
    <script src="../Scripts/courses.js"></script>
</body>
</html>
